<!DOCTYPE html>
<html>
<head>
<title>Riddex AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b1220;
    color: white;
}

/* AUTH */
#auth {
    width: 90%;
    max-width: 320px;
    margin: 80px auto;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: none;
    border-radius: 10px;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, cyan, blue);
    color: black;
    font-weight: bold;
    cursor: pointer;
}

/* HEADER */
.header {
    display: none;
    padding: 15px;
    text-align: center;
    background: #111a2e;
    font-weight: bold;
}

/* SIDEBAR */
.sidebar {
    display: none;
    justify-content: space-around;
    background: #111a2e;
    padding: 10px;
}

.mode {
    padding: 8px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    cursor: pointer;
}

/* MAIN */
.main {
    display: none;
    padding: 10px;
}

/* CHAT */
.chat-box {
    height: 420px;
    overflow-y: auto;
    padding: 10px;
    background: #0f172a;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
    word-wrap: break-word;
}

/* USER */
.user {
    background: cyan;
    color: black;
    align-self: flex-end;
}

/* AI */
.ai {
    background: #1e293b;
    align-self: flex-start;
}

/* INPUT */
.input-box {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.input-box input {
    flex: 1;
}

/* SECTIONS */
.section {
    display: none;
}

.active {
    display: block;
}

/* MOBILE */
@media (max-width: 600px) {

    .chat-box {
        height: 350px;
    }

    .input-box {
        flex-direction: column;
    }

}

</style>

</head>

<body>

<!-- AUTH -->
<div id="auth">
    <h2>⚡ Riddex AI</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>

    <p id="msg"></p>
</div>

<!-- HEADER -->
<div class="header">⚡ RIDDEX AI CHAT</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="mode" onclick="show('chat')">Chat</div>
    <div class="mode" onclick="show('code')">Code</div>
    <div class="mode" onclick="show('debug')">Debug</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- CHAT -->
<div id="chat" class="section active">

    <div class="chat-box" id="chatBox"></div>

    <div class="input-box">
        <input id="chatInput" placeholder="Type message...">
        <button onclick="sendChat()">Send</button>
    </div>

</div>

<!-- CODE -->
<div id="code" class="section">
    <textarea id="code-input" style="width:100%;height:200px;background:#000;color:lime;"></textarea>
    <button onclick="runCode()">Run</button>
    <pre id="code-output"></pre>
</div>

<!-- DEBUG -->
<div id="debug" class="section">
    <textarea id="debug-input" style="width:100%;height:200px;background:#000;color:lime;"></textarea>
    <button onclick="debugCode()">Debug</button>
    <pre id="debug-output"></pre>
</div>

</div>

<script>

const BASE_URL = "https://riddex-backend-1.onrender.com";

/* SHOW */
function show(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* LOGIN */
async function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let res = await fetch(`${BASE_URL}/login`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username,password})
    });

    let data = await res.json();

    if(res.ok){
        document.getElementById("auth").style.display="none";
        document.querySelector(".header").style.display="block";
        document.querySelector(".sidebar").style.display="flex";
        document.querySelector(".main").style.display="block";
    } else {
        document.getElementById("msg").innerText = data.detail;
    }
}

/* SIGNUP */
async function signup(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let res = await fetch(`${BASE_URL}/signup`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username,password})
    });

    let data = await res.json();
    document.getElementById("msg").innerText = data.message || data.detail;
}

/* CHAT */
async function sendChat(){

    let input = document.getElementById("chatInput");
    let box = document.getElementById("chatBox");

    let text = input.value;
    if(!text) return;

    box.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";

    let res = await fetch(`${BASE_URL}/chat`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let data = await res.json();

    box.innerHTML += `<div class="msg ai">${data.response || data.error}</div>`;
    box.scrollTop = box.scrollHeight;
}

/* RUN */
async function runCode(){

    let code = document.getElementById("code-input").value;

    let res = await fetch(`${BASE_URL}/run`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({code})
    });

    let data = await res.json();

    document.getElementById("code-output").innerText =
        (data.output || "") + (data.error || "");
}

/* DEBUG */
async function debugCode(){

    let code = document.getElementById("debug-input").value;

    let res = await fetch(`${BASE_URL}/debug`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({code})
    });

    let data = await res.json();

    document.getElementById("debug-output").innerText =
        data.response || data.error || "";
}

</script>

</body>
</html>
