<!DOCTYPE html>
<html>
<head>
<title>Riddex AI</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background: radial-gradient(circle at top, #0f172a, #020617);
    color:white;
}

/* HEADER */
.header {
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    background:rgba(255,255,255,0.05);
    display:none;
}

/* SIDEBAR */
.sidebar {
    width:220px;
    height:100vh;
    position:fixed;
    background:rgba(255,255,255,0.05);
    padding:20px;
    display:none;
}

.mode {
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    cursor:pointer;
    border:1px solid rgba(0,255,255,0.2);
}

.mode:hover {
    background:cyan;
    color:black;
}

/* MAIN */
.main {
    margin-left:240px;
    padding:20px;
    display:none;
}

/* CHAT */
.chat-box {
    height:400px;
    overflow:auto;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    padding:10px;
}

.msg {
    padding:10px;
    margin:10px;
    border-radius:10px;
    max-width:80%;
}

.user { background:cyan; color:black; margin-left:auto; }
.ai { background:#1e293b; }

/* INPUT */
.input-box {
    display:flex;
    margin-top:10px;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:20px;
}

button {
    padding:10px;
    margin-left:10px;
    border:none;
    border-radius:20px;
    background:cyan;
    cursor:pointer;
}

/* SECTIONS */
.section { display:none; }
.active { display:block; }

textarea {
    width:100%;
    height:200px;
    background:black;
    color:lime;
}

pre {
    background:black;
    color:lime;
    padding:10px;
}

/* LOGIN */
#auth {
    width:300px;
    margin:100px auto;
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:10px;
    text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
    <h2>Riddex AI</h2>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
    <p id="msg"></p>
</div>

<div class="header">⚡ RIDDEX AI</div>

<div class="sidebar">
    <div class="mode" onclick="show('chat')">Chat</div>
    <div class="mode" onclick="show('code')">Code</div>
    <div class="mode" onclick="show('debug')">Debug</div>
    <div class="mode" onclick="show('google')">Google DSA</div>
    <div class="mode" onclick="show('interview')">Interview AI</div>
    <div class="mode" onclick="show('friends')">Friends</div>
</div>

<div class="main">

<div id="chat" class="section active">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-box">
        <input id="chatInput">
        <button onclick="sendChat()">Send</button>
    </div>
</div>

<div id="code" class="section">
    <textarea id="code-input"></textarea>
    <button onclick="runCode()">Run</button>
    <pre id="code-output"></pre>
</div>

<div id="debug" class="section">
    <textarea id="debug-input"></textarea>
    <button onclick="debugCode()">Debug</button>
    <pre id="debug-output"></pre>
</div>

<div id="google" class="section">
    <h2>Google DSA</h2>
    <div class="msg ai">1. Two Sum</div>
    <div class="msg ai">2. Longest Substring</div>
</div>

<div id="interview" class="section">
    <div class="chat-box" id="interviewBox"></div>
    <input id="interviewInput">
    <button onclick="askInterview()">Ask</button>
</div>

<div id="friends" class="section">
    <div class="chat-box" id="friendsBox"></div>
    <input id="friendInput">
    <button onclick="sendFriend()">Send</button>
</div>

</div>

<script>

/* SHOW */
function show(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* LOGIN */

/* LOGIN */
async function login(){
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let res = await fetch("http://127.0.0.1:8000/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username,password})
    });

    let data;
    try{
        data = await res.json();
    }catch{
        document.getElementById("msg").innerText = "Server error";
        return;
    }

    if(res.status==200){
        document.getElementById("auth").style.display="none";
        document.querySelector(".header").style.display="flex";
        document.querySelector(".sidebar").style.display="block";
        document.querySelector(".main").style.display="block";
    } else {
        document.getElementById("msg").innerText = data.detail;
    }
}

/* SIGNUP */
async function signup(){
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let res = await fetch("http://127.0.0.1:8000/signup",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username,password})
    });

    let data;
    try{
        data = await res.json();
    }catch{
        document.getElementById("msg").innerText = "Server error";
        return;
    }

    if(res.status==200){
        document.getElementById("msg").innerText = "Signup successful";
    } else {
        document.getElementById("msg").innerText = data.detail;
    }
}


/* CHAT */
async function sendChat(){
    let input = document.getElementById("chatInput");
    let box = document.getElementById("chatBox");

    let text = input.value;
    box.innerHTML += `<div class="msg user">${text}</div>`;
    input.value="";

    let res = await fetch("http://127.0.0.1:8000/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let data = await res.json();
    box.innerHTML += `<div class="msg ai">${data.response}</div>`;
}

/* CODE */
async function runCode(){
    let code = document.getElementById("code-input").value;

    let res = await fetch("http://127.0.0.1:8000/run",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({code})
    });

    let data = await res.json();

    document.getElementById("code-output").innerText =
        (data.output || "") + (data.error || "");
}

/* DEBUG */
async function debugCode(){
    let code = document.getElementById("debug-input").value;

    let res = await fetch("http://127.0.0.1:8000/debug",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({code})
    });

    let data = await res.json();

    document.getElementById("debug-output").innerText =
        data.response || "";
}

/* INTERVIEW */
function speak(text){
    let s = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(s);
}

async function askInterview(){
    let input = document.getElementById("interviewInput");
    let box = document.getElementById("interviewBox");

    let text = input.value;
    box.innerHTML += `<div class="msg user">${text}</div>`;

    let res = await fetch("http://127.0.0.1:8000/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let data = await res.json();
    box.innerHTML += `<div class="msg ai">${data.response}</div>`;
    speak(data.response);
}

/* FRIEND */
function sendFriend(){
    let input = document.getElementById("friendInput");
    let box = document.getElementById("friendsBox");

    let text = input.value;
    box.innerHTML += `<div class="msg user">${text}</div>`;

    setTimeout(()=>{
        box.innerHTML += `<div class="msg ai">Friend: Nice 😎</div>`;
    },1000);
}

</script>

</body>
</html>
